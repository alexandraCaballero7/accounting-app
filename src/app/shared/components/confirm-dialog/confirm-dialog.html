<div *ngIf="dialog.visible" class="confirm-backdrop">
  <div class="confirm-card shadow-sm p-4 rounded">
    <p class="mb-3">{{ dialog.message }}</p>
    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-secondary btn-sm" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary btn-sm" (click)="confirm()">Delete</button>
    </div>
  </div>
</div>

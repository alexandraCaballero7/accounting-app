<div class="d-flex justify-content-center align-items-start p-3 p-md-5">

<div class="voucher-card  w-100">

<div class="voucher-header d-flex justify-content-between align-items-start">

<div *ngIf="!readonly">
<h2 class="title mb-1">Edit Voucher</h2>
<p class="subtitle mb-0">Edit accounting voucher</p>
</div>

<div *ngIf="readonly">
<h2 class="title mb-1">View Voucher</h2>
<p class="subtitle mb-0">View accounting voucher</p>
</div>

  <div class="d-flex justify-content-end align-items-center gap-2">

     <div *ngIf="readonly" class="d-flex gap-2">
         <button class="edit-delete-voucher-btn" (click)="onDeleteVoucher()">Delete</button>
         <button class="edit-delete-voucher-btn" (click)="onEditVoucher()">Edit</button>
     </div>

      <button class="btn-close btn-close-white" (click)="onCancel()"></button>

 </div>

</div>

<div class="voucher-body">

<app-voucher-form
 *ngIf="voucher"
  [employees]="(employees$ | async) ?? []"
  [voucher]="voucher"
  [readonly]="readonly"
  [itemToEdit]="itemToEdit"
  (addItem)="addItem($event)"
  (submitVoucher)="updateVoucher($event)">
</app-voucher-form>

<app-voucher-items-table
  [items]="items"
  (editItem)="editItem($event)"
  [readonly]="readonly"
  (deleteItem)="deleteItem($event)">
</app-voucher-items-table>

<div class="text-end mt-3">

<h5>
Total Amount:
<span class="text-primary">
{{ totalAmount | currency }}
</span>
</h5>

</div>

</div>

</div>

</div>

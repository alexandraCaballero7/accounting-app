<div class="container-fluid py-3">
  <div class="card shadow-sm h-100" style="min-height: 90vh;">

    <div class="d-flex justify-content-between align-items-center p-3 border-bottom flex-wrap">
      
        <div>  
      <h2 class="mb-0">Employees</h2>
      <p >Manage your team members</p>
        </div> 
      <button class="btn btn-primary btn-sm mt-2 mt-md-0" (click)="onCreate()">Create Employee</button>
    </div>

    <div class="table-wrapper flex-grow-1 p-3" style="overflow-y: auto; max-height: calc(90vh - 80px);">
      <app-generic-table
        [data]="employees"
        [columns]="columns"
        (view)="onView($event)"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)">
      </app-generic-table>
    </div>

  </div>
</div>
